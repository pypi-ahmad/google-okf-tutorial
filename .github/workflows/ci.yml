name: ci

on:
  push:
  pull_request:

jobs:
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run repo checks (no network, no secrets)
        run: bash scripts/smoke.sh
